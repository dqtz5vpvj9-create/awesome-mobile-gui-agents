schema_version: "1.0"

resources:
  - name: AgentCPM-GUI
    category: Agent model and training
    url: https://github.com/OpenBMB/AgentCPM-GUI
    note_en: Open model inference, RFT, and offline evaluation code; no verified live device-control loop, so it is not counted as a complete agent.
    note_zh: 公开模型推理、RFT 与离线评测代码；未核验到真机控制闭环，因此不计为完整 Agent。
  - name: Auto-UI
    category: Agent model and training
    url: https://github.com/cooelf/Auto-GUI
    note_en: Training and offline inference for multimodal chain-of-action prediction, not a released live mobile controller.
    note_zh: 面向多模态动作链预测的训练与离线推理，并非已发布的实时移动控制器。
  - name: UI-S1
    category: Training method
    url: https://github.com/X-PLUG/MobileAgent/tree/main/UI-S1
    note_en: Semi-online reinforcement learning, dataset, and model resources; not a separate runtime agent entry.
    note_zh: 半在线强化学习、数据集与模型资源，不作为独立运行时 Agent 条目。
  - name: MobileGym
    category: Environment and benchmark
    url: https://github.com/Purewhiter/mobilegym
    note_en: A browser-hosted Android simulation and evaluation environment for agent research.
    note_zh: 面向 Agent 研究的浏览器托管 Android 仿真与评测环境。
  - name: AndroidWorld
    category: Environment and benchmark
    url: https://github.com/google-research/android_world
    note_en: A live Android benchmark and environment; only its runnable M3A baseline is counted in the main agent catalog.
    note_zh: 动态 Android benchmark 与环境；主榜仅计入其中可运行的 M3A 基线。
