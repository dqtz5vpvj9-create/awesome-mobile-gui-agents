      en: It publishes both a real-device execution path and an AndroidWorld integration for a current agent family.
      zh: 它同时公开了真机执行路径和 AndroidWorld 集成。
    limitations:
      en: Running the strongest configurations requires large GUI-Owl models and substantial serving infrastructure.
      zh: 运行最强配置需要大型 GUI-Owl 模型与较重的推理基础设施。

