schema_version: "1.0"
catalog:
  title: Awesome Mobile GUI Agents
  tagline: A manually curated collection of high-quality, open-source Mobile GUI Agents.
  scope: Complete or meaningfully runnable agents that perceive and operate Android, iOS, or HarmonyOS graphical interfaces.

agents:
  - id: mobile-agent-v3-5
    name: Mobile-Agent-v3.5
    family: Mobile-Agent
    release:
      date: "2026-02-15"
      basis: paper-first-public
    code:
      repo: X-PLUG/MobileAgent
      url: https://github.com/X-PLUG/MobileAgent/tree/main/Mobile-Agent-v3.5
      stars_scope: family-level
    paper:
      title: "Mobile-Agent-v3.5: Multi-platform Fundamental GUI Agents"
      url: https://arxiv.org/abs/2602.16855
      venue: arXiv 2026
      openalex_ids: [W7130694760, W7130762913]
    platforms: [Android]
    perception: [screenshots, GUI-Owl-1.5 grounding, action history]
    actions: [ADB mobile actions, browser actions, desktop actions]
    capabilities: [multi-platform planning, reflection, long-horizon memory, tool use]
    recovery:
      level: reflection
      evidence: Thinking variants and the Mobile-Agent controller support planning and reflection; no explicit state rollback guarantee is documented.
    evidence:
      - kind: benchmark
        label: AndroidWorld runner
        url: https://github.com/X-PLUG/MobileAgent/tree/main/Mobile-Agent-v3.5#evaluation-on-androidworld
      - kind: demo
        label: Mobile runner
        url: https://github.com/X-PLUG/MobileAgent/tree/main/Mobile-Agent-v3.5#deploy-gui-owl-15-on-your-mobile-device
    license:
      spdx: MIT
      status: open-source
      url: https://github.com/X-PLUG/MobileAgent/blob/main/LICENSE
    runnable:
      entrypoint_path: Mobile-Agent-v3.5/mobile_use/run_gui_owl_1_5_for_mobile.py
      entrypoint_url: https://github.com/X-PLUG/MobileAgent/blob/main/Mobile-Agent-v3.5/mobile_use/run_gui_owl_1_5_for_mobile.py
      install: GUI-Owl-1.5 model service, Qwen dependencies, ADB Keyboard, and a supported device.
    audit:
      status: links-verified
      date: "2026-07-15"
      install_smoke_tested: false
      notes: Mobile entrypoint, AndroidWorld scripts, model links, duplicate OpenAlex identities, and shared license were verified.
    summary:
      en: The current Mobile-Agent generation built around GUI-Owl-1.5, with a released Android phone runner.
      zh: 围绕 GUI-Owl-1.5 构建、已发布 Android 手机 runner 的最新 Mobile-Agent。
    why_included:
      en: It is a released, runnable mobile controller rather than only a model checkpoint or training recipe.
      zh: 它提供了已发布且可运行的移动控制器，而不只是模型权重或训练方案。
    limitations:
      en: The released phone runner is ADB-based Android code; other platform claims should not be read as a released iOS controller.
      zh: 已发布的手机 runner 是基于 ADB 的 Android 代码，不应把其他多平台表述理解为已发布 iOS 控制器。

  - id: open-autoglm
    name: Open-AutoGLM Phone Agent
    family: AutoGLM
    release:
      date: "2025-12-08"
      basis: code-repository-created
    code:
      repo: zai-org/Open-AutoGLM
      url: https://github.com/zai-org/Open-AutoGLM
      stars_scope: repository-level
    paper:
      title: "AutoGLM: Autonomous Foundation Agents for GUIs"
      url: https://arxiv.org/abs/2411.00820
      venue: arXiv 2024
      openalex_ids: [W4404350148]
    platforms: [Android, iOS, HarmonyOS]
    perception: [screenshots, vision-language model observations]
    actions: [ADB Android actions, HDC HarmonyOS actions, WebDriverAgent iOS actions]
    capabilities: [natural-language tasks, visual planning, sensitive-action confirmation, human takeover, remote device connections]
    recovery:
      level: retry
      evidence: The runner handles failed actions and human takeover cases, but the public documentation does not claim explicit long-range recovery.
    evidence:
      - kind: demo
        label: Phone Agent quick start
        url: https://github.com/zai-org/Open-AutoGLM#快速开始
      - kind: documentation
        label: iOS setup
        url: https://github.com/zai-org/Open-AutoGLM/blob/main/docs/ios_setup/ios_setup.md
    license:
      spdx: Apache-2.0
      status: open-source
      url: https://github.com/zai-org/Open-AutoGLM/blob/main/LICENSE
    runnable:
      entrypoint_path: main.py
      entrypoint_url: https://github.com/zai-org/Open-AutoGLM/blob/main/main.py
      install: Python package installation, a model endpoint or local deployment, and ADB, HDC, or WebDriverAgent.
    audit:
      status: links-verified
      date: "2026-07-15"
      install_smoke_tested: false
      notes: Main CLI, Python API, Android, HarmonyOS and iOS paths, paper identity, and Apache license were verified.
    summary:
      en: An official visual Phone Agent runtime for Android, iOS, and HarmonyOS built around AutoGLM.
      zh: 围绕 AutoGLM 构建、覆盖 Android、iOS 与 HarmonyOS 的官方视觉 Phone Agent 运行时。
    why_included:
      en: It is an unusually complete official release with multiple device backends, safety confirmation, and human takeover.
      zh: 它是少见的完整官方发布，包含多设备后端、敏感操作确认和人工接管。
    limitations:
      en: The current code repository appeared well after the paper and strongest operation quality depends on model availability.
      zh: 当前代码仓库晚于论文发布，最强操作质量也依赖模型可用性。

