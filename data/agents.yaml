      title: "Do Multi-Agents Dream of Electric Screens? Achieving Perfect Accuracy on AndroidWorld Through Task Decomposition"
      url: https://arxiv.org/abs/2602.07787
      venue: arXiv 2026
      openalex_ids: [W7128514075]
    platforms: [Android, iOS]
    perception: [screenshots, accessibility metadata, agent observations]
    actions: [ADB Android actions, iOS IDB actions]
    capabilities: [multi-agent decomposition, local SDK, CLI, skills, Android and iOS control]
    recovery:
      level: replanning
      evidence: The framework decomposes goals among agents and can revise the next subtask from updated device observations; it does not claim state rollback.
    evidence:
      - kind: benchmark
        label: AndroidWorld report
        url: https://minitap.ai/benchmark
      - kind: documentation
        label: Local quick start
        url: https://github.com/minitap-ai/mobile-use#local-quick-start
