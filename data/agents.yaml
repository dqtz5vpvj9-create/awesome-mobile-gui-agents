      spdx: Apache-2.0
      status: open-source
      url: https://github.com/minitap-ai/mobile-use/blob/main/LICENSE
    runnable:
      entrypoint_path: minitap/mobile_use/main.py
      entrypoint_url: https://github.com/minitap-ai/mobile-use/blob/main/minitap/mobile_use/main.py
      install: Python package or Docker setup, an Android or iOS bridge, a device, and model credentials.
    audit:
      status: links-verified
      date: "2026-07-15"
      install_smoke_tested: false
      notes: SDK and CLI paths, Android and iOS setup, benchmark page, paper identity, and Apache license were verified.
    summary:
      en: A local Android and iOS agent framework centered on task decomposition and reusable skills.
      zh: 以任务分解和可复用 skills 为核心的本地 Android/iOS Agent 框架。
    why_included:
      en: It offers a substantial, actively maintained cross-platform runtime rather than only benchmark outputs.
      zh: 它提供了规模较大、持续维护的跨平台运行时，而不只是 benchmark 结果。
    limitations:
      en: The 100 percent AndroidWorld claim is self-reported on the project benchmark page and is not an independent recovery evaluation.
      zh: AndroidWorld 100% 是项目方自报结果，也不是独立的错误恢复评测。

  - id: mobileuse-madeagents
    name: MobileUse
    family: MobileUse
    release:
      date: "2025-02-27"
      basis: code-repository-created
    code:
      repo: MadeAgents/mobile-use
      url: https://github.com/MadeAgents/mobile-use
      stars_scope: repository-level
    paper:
      title: "MobileUse: A Hierarchical Reflection-Driven GUI Agent for Autonomous Mobile Operation"
      url: https://arxiv.org/abs/2507.16853
      venue: NeurIPS 2025
      openalex_ids: [W4414877003]
    platforms: [Android]
    perception: [screenshots, multimodal model observations, repeated-state signals]
    actions: [ADB tap, swipe, text input, app launch, navigation keys]
    capabilities: [multi-agent planning, hierarchical reflection, proactive exploration, memory, WebUI, Python API]
    recovery:
      level: replanning
      evidence: Action, trajectory, and global reflection operate at different temporal scales, with retries and revised execution after detected failures.
    evidence:
      - kind: benchmark
        label: AndroidWorld and AndroidLab
        url: https://github.com/MadeAgents/mobile-use#benchmark
      - kind: demo
        label: Python API
        url: https://github.com/MadeAgents/mobile-use#use-in-python
    license:
      spdx: MIT
      status: open-source
      url: https://github.com/MadeAgents/mobile-use/blob/master/LICENSE
    runnable:
      entrypoint_path: pyproject.toml
      entrypoint_url: https://github.com/MadeAgents/mobile-use/blob/master/pyproject.toml
      install: Python package installation, ADB and ADB Keyboard, an Android device, and a configured VLM endpoint.
    audit:
      status: links-verified
      date: "2026-07-15"
      install_smoke_tested: false
      notes: Package metadata, Python API, WebUI, benchmark runners, paper identity, and license were verified.
    summary:
      en: A complete Android agent with hierarchical reflection, proactive exploration, and benchmark integrations.
      zh: 集成分层反思、主动探索与 benchmark 运行器的完整 Android Agent。
    why_included:
      en: It is one of the clearest open implementations of runtime error detection and correction in a mobile agent.
      zh: 它是移动 Agent 运行时错误检测与纠正最清晰的开源实现之一。
    limitations:
      en: Strong reported results use large external VLMs, and no common dedicated recovery benchmark is used.
      zh: 较强结果依赖大型外部 VLM，且没有采用统一的专用恢复 benchmark。

