schema_version: "1.0"

notable:
  - name: BacktrackAgent
    status: code-pending
    paper_url: https://aclanthology.org/2025.emnlp-main.212/
    venue: EMNLP 2025
    reason_en: Explicit outcome-conditioned error detection and backtracking, but no official public implementation was found at the audit date.
    reason_zh: 显式进行结果条件化错误检测与回退，但截至审计日未发现官方公开实现。
  - name: Agent-SAMA
    status: code-pending
    paper_url: https://ojs.aaai.org/index.php/AAAI/article/view/40187
    venue: AAAI 2026
    reason_en: Strong mobile stable-state restoration results, but no official public code repository was found.
    reason_zh: 移动端稳定状态恢复证据很强，但未发现官方公开代码仓库。
  - name: VeriGUI
    status: code-pending
    paper_url: https://aclanthology.org/2026.acl-long.1335/
    venue: ACL 2026
    reason_en: Direct action-effect verification and failure-recovery training, with no official released implementation found.
    reason_zh: 直接研究动作效果验证与失败恢复训练，但未发现已发布的官方实现。
  - name: MobileExplorer
    status: code-announced
    paper_url: https://arxiv.org/abs/2605.26546
    venue: arXiv 2026
    reason_en: Uses two-level UI rollback for speculative parallel exploration; the paper says code will be released after publication.
    reason_zh: 用两级 UI 回滚支持推测式并行探索；论文说明代码将在发表后发布。
  - name: D-Artemis
    status: public-repository-pending
    paper_url: https://aclanthology.org/2026.findings-acl.681/
    venue: Findings of ACL 2026
    reason_en: A mobile GUI agent with recovery-oriented execution evidence, but no durable official public repository was verified.
    reason_zh: 提供面向恢复的移动 GUI Agent 执行证据，但未核验到稳定的官方公开仓库。

qualification_pending:
  - name: AppAgent v2
    code_url: https://github.com/TencentQQGYLab/AppAgent
    status: implementation-not-identifiable
    reason_en: The linked repository exposes the original AppAgent runner, with no v2 branch, tag, or separately identifiable v2 entrypoint.
    reason_zh: 所链接仓库只可辨识出原版 AppAgent runner，没有 v2 分支、tag 或独立入口。
  - name: CoCo-Agent
    code_url: https://github.com/xbmxb/CoCo-Agent
    status: license-pending
    reason_en: Runnable research code is public, but the root repository has no explicit software license.
    reason_zh: 研究代码已公开且可运行，但根仓库没有明确软件许可证。
  - name: MobA
    code_url: https://github.com/OpenDFM/MobA
    status: license-pending
    reason_en: The official repository has code and requirements but no explicit root license.
    reason_zh: 官方仓库有代码与依赖文件，但没有明确根许可证。
  - name: AppAgentX
    code_url: https://github.com/Westlake-AGI-Lab/AppAgentX
    status: license-pending
    reason_en: The official repository is runnable, but only a nested third-party component carries a visible license.
    reason_zh: 官方仓库可运行，但可见许可证仅属于嵌套的第三方组件。
  - name: InfiGUIAgent
    code_url: https://github.com/InfiXAI/InfiGUIAgent
    status: implementation-pending
    reason_en: The official repository currently contains a README and images, not the claimed agent implementation.
    reason_zh: 官方仓库目前只有 README 与图片，没有对应 Agent 实现。
  - name: UI-Venus
    code_url: https://github.com/inclusionAI/UI-Venus
    status: license-pending
    reason_en: Agent and model code is present, but no explicit root software license was verified.
    reason_zh: Agent 与模型代码已存在，但未核验到明确的根软件许可证。
  - name: OMG-Agent
    code_url: https://github.com/Safphere/OMG-Agent
    status: source-available
    reason_en: Its Apache-plus-Commons-Clause terms add commercial and modification restrictions and are not treated as an OSI open-source license.
    reason_zh: 其 Apache 加 Commons Clause 条款包含商业与修改限制，因此不按 OSI 开源许可证处理。
  - name: OpenGUI
    code_url: https://github.com/Core-Mate/OpenGUI
    status: source-available
    reason_en: The repository uses BUSL-1.1 and does not convert to an open-source license until 2030.
    reason_zh: 仓库采用 BUSL-1.1，要到 2030 年才转换为开源许可证。
