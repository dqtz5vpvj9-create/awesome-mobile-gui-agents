name: Refresh metric snapshot

on:
  schedule:
    - cron: "17 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Capture GitHub and OpenAlex snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python scripts/catalog.py refresh --date "$(date -u +%F)"
      - name: Regenerate and verify
        run: |
          python scripts/catalog.py render
          python scripts/catalog.py validate
          python scripts/catalog.py check
          pytest
      - name: Open human-review pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/monthly-metrics
          delete-branch: true
          commit-message: "data: refresh monthly GitHub and OpenAlex snapshot"
          title: "data: refresh monthly metric snapshot"
          body: |
            Automated monthly GitHub-star and OpenAlex-citation snapshot.

            Human review is required before merge. Please inspect license changes,
            missing runnable paths, paper identity changes, and unexpected metric shifts.
          labels: metrics, automated
