name: Validate catalog

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate structured data and snapshot
        run: python scripts/catalog.py validate
      - name: Check generated READMEs
        run: python scripts/catalog.py check
      - name: Test
        run: pytest
